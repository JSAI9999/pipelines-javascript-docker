<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Take It</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#343541;
color:white;
}

.container{
display:flex;
height:100vh;
}

/* Sidebar */

.sidebar{
width:260px;
background:#202123;
padding:20px;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.newchat{
background:#444654;
padding:10px;
border-radius:6px;
text-align:center;
cursor:pointer;
margin-bottom:20px;
}

.newchat:hover{
background:#565869;
}

.menu{
list-style:none;
padding:0;
}

.menu li{
padding:10px;
border-radius:6px;
margin-bottom:5px;
cursor:pointer;
}

.menu li:hover{
background:#444654;
}

/* Chat Area */

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
padding:20px;
overflow-y:auto;
}

.message{
padding:12px;
border-radius:8px;
margin-bottom:10px;
max-width:70%;
}

.user{
background:#10a37f;
margin-left:auto;
}

.bot{
background:#444654;
}

/* Input Area */

.input-area{
display:flex;
padding:15px;
background:#40414f;
}

.input-area input{
flex:1;
padding:12px;
border:none;
border-radius:6px;
outline:none;
}

.input-area button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:6px;
background:#10a37f;
color:white;
cursor:pointer;
}

.input-area button:hover{
background:#0e8c6a;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">Take It</div>

<div class="newchat">+ New Chat</div>

<ul class="menu">
<li>DevOps Help</li>
<li>Python Questions</li>
<li>Project Ideas</li>
</ul>

</div>

<div class="chat">

<div class="messages" id="messages">

<div class="message bot">
Hello 👋 Welcome to Take It
</div>

</div>

<div class="input-area">

<input type="text" id="input" placeholder="Ask something...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

</div>

<script>

function sendMessage(){

let input = document.getElementById("input")
let message = input.value

if(message.trim() === "") return

let messages = document.getElementById("messages")

let userMessage = document.createElement("div")
userMessage.className = "message user"
userMessage.innerText = message

messages.appendChild(userMessage)

input.value = ""

setTimeout(()=>{

let botMessage = document.createElement("div")
botMessage.className = "message bot"
botMessage.innerText = "Take It AI is thinking..."

messages.appendChild(botMessage)

messages.scrollTop = messages.scrollHeight

},500)

}

</script>

</body>
</html>
